<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — LouShoot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Syne:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--black:#000000;--dark:#070707;--surface:#101010;--line:#1A1A1A;--grey:#7A7A7A;--white:#F4F4F4;--white-dim:#A6A6A6;--accent:#C2A882;--serif:'Cormorant',Georgia,serif;--sans:'Syne',sans-serif;--ease:cubic-bezier(.25,.1,.25,1);--ease-out:cubic-bezier(0,0,.2,1)}
    html{background:var(--black);color:var(--white);font-family:var(--sans);cursor:none}
    body{background:var(--black);overflow-x:hidden}
    #noise{position:fixed;inset:0;pointer-events:none;z-index:9000;opacity:.032;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}
    #cursor-dot{position:fixed;width:5px;height:5px;background:var(--white);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:background .2s,width .25s,height .25s}
    #cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(240,235,227,.35);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s var(--ease),height .3s var(--ease),border-color .3s}
    body.ch #cursor-dot{width:7px;height:7px;background:var(--accent)}
    body.ch #cursor-ring{width:52px;height:52px;border-color:rgba(194,168,130,.45)}

    nav{position:fixed;top:0;left:0;right:0;z-index:800;display:flex;align-items:center;justify-content:space-between;padding:28px 48px;transition:padding .6s var(--ease)}
    nav.scrolled{padding:20px 48px;background:rgba(8,8,8,.88);backdrop-filter:blur(14px);border-bottom:1px solid rgba(42,42,42,.5)}
    .nav-logo{font-family:var(--serif);font-weight:300;font-size:16px;letter-spacing:.25em;text-transform:uppercase;color:var(--white);text-decoration:none;cursor:none}
    .nav-back{font-family:var(--sans);font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--white-dim);text-decoration:none;cursor:none;display:flex;align-items:center;gap:10px;transition:color .4s}
    .nav-back:hover{color:var(--white)}

    .contact-hero{width:100%;height:80svh;min-height:500px;position:relative;overflow:hidden;margin-top:0}
    .contact-hero img,.contact-hero .ph{width:100%;height:100%;object-fit:cover;object-position:center 18%;display:block;background:var(--dark)}
    .contact-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,8,8,.85) 0%,rgba(8,8,8,.1) 55%,transparent 75%)}

    .contact-gallery{display:grid;grid-template-columns:1fr;gap:0;padding:3px 3px 0}
    .cg-item{aspect-ratio:4/5;overflow:hidden;background:var(--dark)}
    .cg-item img,.cg-item .ph{width:100%;height:100%;object-fit:cover;display:block;background:var(--surface)}
    .cg-item:nth-child(2){margin-top:0}

    .contact-block{padding:80px 48px 120px;display:flex;flex-direction:column;align-items:center;text-align:center;border-top:1px solid var(--line)}
    .contact-messaging{width:min(760px,100%);margin:12px auto 0;padding:42px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.015),rgba(255,255,255,.005));text-align:left}
    .msg-intro{font-family:var(--serif);font-size:clamp(22px,2.4vw,34px);font-weight:300;letter-spacing:.04em;color:var(--white);margin-bottom:12px}
    .msg-copy{font-family:var(--serif);font-size:15px;line-height:1.7;color:var(--white-dim);margin-bottom:28px}
    .msg-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .msg-field{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
    .msg-field.full{grid-column:1 / -1}
    .msg-label{font-family:var(--sans);font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--grey)}
    .msg-input,.msg-textarea{width:100%;background:#050505;border:1px solid var(--line);color:var(--white);padding:16px 18px;font-family:var(--sans);font-size:14px;outline:none;transition:border-color .35s var(--ease),background .35s var(--ease)}
    .msg-input:focus,.msg-textarea:focus{border-color:rgba(244,244,244,.28);background:#080808}
    .msg-textarea{min-height:180px;resize:vertical}
    .msg-actions{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-top:8px;flex-wrap:wrap}
    .msg-note{font-family:var(--sans);font-size:10px;letter-spacing:.16em;color:var(--grey)}
    .msg-submit{appearance:none;border:1px solid rgba(244,244,244,.16);background:#0a0a0a;color:var(--white);padding:16px 22px;font-family:var(--sans);font-size:10px;letter-spacing:.28em;text-transform:uppercase;cursor:none;transition:transform .35s var(--ease),border-color .35s var(--ease),background .35s var(--ease)}
    .msg-submit:hover{transform:translateY(-1px);border-color:rgba(244,244,244,.32);background:#111}
    .msg-alert{margin-top:18px;font-family:var(--sans);font-size:11px;letter-spacing:.08em;color:var(--white-dim)}
    .contact-eyebrow{font-family:var(--sans);font-size:9px;letter-spacing:.38em;text-transform:uppercase;color:var(--grey);margin-bottom:28px}
    .contact-title{font-family:var(--serif);font-size:clamp(40px,6vw,78px);font-weight:300;letter-spacing:.06em;line-height:1;color:var(--white);margin-bottom:56px}
    .contact-links{display:flex;flex-direction:column;gap:20px;align-items:center;margin-bottom:56px}
    .contact-link{font-family:var(--sans);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--white-dim);text-decoration:none;cursor:none;display:flex;align-items:center;gap:16px;transition:color .4s}
    .contact-link:hover{color:var(--white)}
    .contact-link svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.2;flex-shrink:0}
    .contact-sep{width:1px;height:28px;background:var(--line)}
    .contact-email-note{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--grey)}

    .reveal{opacity:0;transform:translateY(24px);transition:opacity .9s var(--ease-out),transform .9s var(--ease-out)}
    .reveal.v{opacity:1;transform:translateY(0)}
    .rd1{transition-delay:.1s}.rd2{transition-delay:.22s}.rd3{transition-delay:.34s}

    footer{padding:28px 48px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line)}
    .ft-logo{font-family:var(--serif);font-weight:300;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--grey)}
    .ft-copy{font-family:var(--sans);font-size:9px;letter-spacing:.18em;color:var(--grey)}

    @media(max-width:768px){
      nav,nav.scrolled{padding:20px 24px}
      .contact-hero{height:60svh}
      .contact-gallery{grid-template-columns:1fr;padding:3px}
      .cg-item:nth-child(2){margin-top:0}
      .contact-block{padding:60px 24px 80px}
      footer{padding:24px 20px;flex-direction:column;gap:12px}
    }
  </style>
</head>
<body>
  <div id="noise"></div>
  <div id="cursor-dot"></div>
  <div id="cursor-ring"></div>

  <nav id="navbar">
    <a href="index.html" class="nav-logo">LouShoot</a>
    <a href="index.html" class="nav-back">
      <svg width="20" height="8" viewBox="0 0 20 8" fill="none"><line x1="20" y1="4" x2="3" y2="4" stroke="currentColor" stroke-width=".8"/><polyline points="6,1 1,4 6,7" fill="none" stroke="currentColor" stroke-width=".8"/></svg>
      Home
    </a>
  </nav>

  <div class="contact-hero">
    <img src="assets/sections/contact/section-entry/COUV.jpg" alt="LouShoot" />
    <div class="contact-hero-overlay"></div>
  </div>

  <div class="contact-gallery">
    <div class="cg-item reveal rd1">
      <img src="assets/sections/contact/section-entry/COUV.jpg" alt="LouShoot portrait" />
    </div>
  </div>

  <div class="contact-block">
    <p class="contact-eyebrow reveal">Get in touch</p>
    <h1 class="contact-title reveal rd1">LouShoot</h1>

    <div class="contact-links reveal rd2">
      <a href="https://www.instagram.com/lou.shoot/" target="_blank" rel="noopener" class="contact-link">
        <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4.5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
        <span>Instagram</span>
      </a>
      <div class="contact-sep"></div>
      <a href="https://www.tiktok.com/@lou.shoot" target="_blank" rel="noopener" class="contact-link">
        <svg viewBox="0 0 24 24"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>
        <span>TikTok</span>
      </a>
    </div>

    <div class="contact-messaging reveal rd3">
      <h2 class="msg-intro">Messaging</h2>
      <p class="msg-copy">Use this space to prepare a direct email request from the portfolio, in a layout aligned with Lou Shoot’s editorial universe.</p>
      <form id="contact-form" novalidate>
        <div class="msg-grid">
          <div class="msg-field">
            <label class="msg-label" for="msg-name">Name</label>
            <input class="msg-input" id="msg-name" name="name" type="text" autocomplete="name" required />
          </div>
          <div class="msg-field">
            <label class="msg-label" for="msg-email">Email</label>
            <input class="msg-input" id="msg-email" name="email" type="email" autocomplete="email" required />
          </div>
          <div class="msg-field full">
            <label class="msg-label" for="msg-subject">Subject</label>
            <input class="msg-input" id="msg-subject" name="subject" type="text" required />
          </div>
          <div class="msg-field full">
            <label class="msg-label" for="msg-message">Message</label>
            <textarea class="msg-textarea" id="msg-message" name="message" required></textarea>
          </div>
        </div>
        <div class="msg-actions">
          <p class="msg-note">Direct mail handoff via your visitor’s mail client.</p>
          <button class="msg-submit" type="submit">Send message</button>
        </div>
        <p class="msg-alert" id="msg-alert" aria-live="polite"></p>
      </form>
    </div>
  </div>

  <footer>
    <span class="ft-logo">LouShoot</span>
    <span class="ft-copy">© 2025 — All rights reserved</span>
  </footer>

  <script>
    const dot=document.getElementById('cursor-dot'),ring=document.getElementById('cursor-ring');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
    (function r(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(r);})();
    document.querySelectorAll('a').forEach(el=>{el.addEventListener('mouseenter',()=>document.body.classList.add('ch'));el.addEventListener('mouseleave',()=>document.body.classList.remove('ch'));});
    window.addEventListener('scroll',()=>document.getElementById('navbar').classList.toggle('scrolled',scrollY>60),{passive:true});
    const obs=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('v');obs.unobserve(x.target);}}),{threshold:.1});
    document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));

    const CONTACT_EMAIL = ''; // Replace with Lou Shoot's real email address before production
    const form = document.getElementById('contact-form');
    const alertBox = document.getElementById('msg-alert');
    if(form){
      form.addEventListener('submit', (event) => {
        event.preventDefault();
        const data = new FormData(form);
        const name = String(data.get('name') || '').trim();
        const email = String(data.get('email') || '').trim();
        const subject = String(data.get('subject') || '').trim();
        const message = String(data.get('message') || '').trim();

        if(!name || !email || !subject || !message){
          alertBox.textContent = 'Please complete every field before sending your message.';
          return;
        }

        if(!CONTACT_EMAIL){
          alertBox.textContent = "Set Lou Shoot's email in CONTACT_EMAIL to activate direct sending.";
          return;
        }

        const body = `Name: ${name}\nEmail: ${email}\n\n${message}`;
        const href = `mailto:${CONTACT_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        window.location.href = href;
        alertBox.textContent = 'Opening your mail client…';
      });
    }
  </script>
</body>
</html>
