<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dedictd — LouShoot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Syne:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--black:#080808;--dark:#161616;--surface:#1E1E1E;--line:#2A2A2A;--grey:#5A5A5A;--white:#F0EBE3;--white-dim:#9A9390;--accent:#C2A882;--serif:'Cormorant',Georgia,serif;--sans:'Syne',sans-serif;--ease:cubic-bezier(.25,.1,.25,1);--ease-out:cubic-bezier(0,0,.2,1)}
    html{background:var(--black);color:var(--white);font-family:var(--sans);cursor:none}body{background:var(--black);overflow-x:hidden}
    #noise{position:fixed;inset:0;pointer-events:none;z-index:9000;opacity:.032;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}
    #cursor-dot{position:fixed;width:5px;height:5px;background:var(--white);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
    #cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(240,235,227,.35);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s var(--ease),height .3s,border-color .3s}
    body.ch #cursor-dot{width:7px;height:7px;background:var(--accent)}body.ch #cursor-ring{width:52px;height:52px;border-color:rgba(194,168,130,.45)}
    nav{position:fixed;top:0;left:0;right:0;z-index:800;display:flex;align-items:center;justify-content:space-between;padding:28px 48px;transition:padding .6s var(--ease)}
    nav.scrolled{padding:20px 48px;background:rgba(8,8,8,.88);backdrop-filter:blur(14px);border-bottom:1px solid rgba(42,42,42,.5)}
    .nav-logo{font-family:var(--serif);font-weight:300;font-size:16px;letter-spacing:.25em;text-transform:uppercase;color:var(--white);text-decoration:none;cursor:none}
    .nav-back{font-family:var(--sans);font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--white-dim);text-decoration:none;cursor:none;display:flex;align-items:center;gap:10px;transition:color .4s}
    .nav-back:hover{color:var(--white)}
    .proj-hero{width:100%;height:100svh;min-height:560px;position:relative;overflow:hidden}
    .proj-hero img,.proj-hero .ph{width:100%;height:100%;object-fit:cover;display:block;background:var(--dark)}
    .proj-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,8,8,.9) 0%,rgba(8,8,8,.15) 45%,transparent 65%)}
    .proj-hero-content{position:absolute;bottom:0;left:0;padding:0 48px 60px;z-index:2}
    .proj-category{font-family:var(--sans);font-size:9px;letter-spacing:.35em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
    .proj-title{font-family:var(--serif);font-size:clamp(42px,7vw,88px);font-weight:300;letter-spacing:.05em;line-height:.92;color:var(--white)}
    .proj-banner{width:100%;aspect-ratio:16/7;overflow:hidden;margin:3px 0;background:var(--dark)}
    .proj-banner img,.proj-banner .ph{width:100%;height:100%;object-fit:cover;display:block;background:var(--surface)}
    .proj-desc{padding:60px 48px;max-width:700px}
    .proj-desc p{font-family:var(--serif);font-size:clamp(15px,1.4vw,18px);font-weight:300;font-style:italic;line-height:1.8;color:var(--white-dim)}
    .proj-gallery{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:0 0 3px}
    .gal-item{aspect-ratio:4/5;overflow:hidden;background:var(--dark)}
    .gal-item img,.gal-item .ph{width:100%;height:100%;object-fit:cover;display:block;background:var(--surface)}
    .gal-item:nth-child(2){margin-top:60px}
    .proj-footer{padding:40px 48px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
    .pf-logo{font-family:var(--serif);font-weight:300;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--grey)}
    .pf-back{font-family:var(--sans);font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--grey);text-decoration:none;cursor:none;transition:color .4s}
    .pf-back:hover{color:var(--white)}
    @media(max-width:768px){nav,nav.scrolled{padding:20px 24px}.proj-hero-content{padding:0 24px 40px}.proj-desc{padding:40px 20px}.proj-gallery{grid-template-columns:1fr}.gal-item:nth-child(2){margin-top:0}.proj-footer{padding:28px 20px;flex-direction:column;gap:12px}}
  </style>
</head>
<body>
  <div id="noise"></div><div id="cursor-dot"></div><div id="cursor-ring"></div>
  <nav id="navbar">
    <a href="../index.html" class="nav-logo">LouShoot</a>
    <a href="../brand.html" class="nav-back"><svg width="20" height="8" viewBox="0 0 20 8" fill="none"><line x1="20" y1="4" x2="3" y2="4" stroke="currentColor" stroke-width=".8"/><polyline points="6,1 1,4 6,7" fill="none" stroke="currentColor" stroke-width=".8"/></svg>Brand</a>
  </nav>
  <div class="proj-hero">
    <img src="../assets/sections/brand/dedictd/couv.jpg" alt="Dedictd"/>
    <div class="proj-hero-overlay"></div>
    <div class="proj-hero-content">
      <p class="proj-category">Campaign · Brand</p>
      <h1 class="proj-title">Dedictd</h1>
    </div>
  </div>
  <div class="proj-banner">
    <img src="../assets/sections/brand/dedictd/Banniere.jpg" alt="Dedictd — bannière"/>
  </div>
  <div class="proj-desc"><p>Dedicated to those who move differently. A campaign rooted in attitude, presence, and precise visual tension.</p></div>
  <div class="proj-gallery">
    <div class="gal-item"><img src="../assets/sections/brand/dedictd/1L8A4693-2.jpg" alt="Dedictd image 1" /></div>
    <div class="gal-item"><img src="../assets/sections/brand/dedictd/1L8A9280.jpg" alt="Dedictd image 2" /></div>
    <div class="gal-item"><img src="../assets/sections/brand/dedictd/1L8A4709.jpg" alt="Dedictd image 3" /></div>
    <div class="gal-item"><img src="../assets/sections/brand/dedictd/1L8A9232.jpg" alt="Dedictd image 4" /></div>
  </div>
  <footer class="proj-footer">
    <span class="pf-logo">LouShoot</span>
    <a href="../brand.html" class="pf-back">← Back to Brand</a>
  </footer>
  <script>
    const dot=document.getElementById('cursor-dot'),ring=document.getElementById('cursor-ring');let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
    (function r(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(r);})();
    document.querySelectorAll('a').forEach(el=>{el.addEventListener('mouseenter',()=>document.body.classList.add('ch'));el.addEventListener('mouseleave',()=>document.body.classList.remove('ch'));});
    window.addEventListener('scroll',()=>document.getElementById('navbar').classList.toggle('scrolled',scrollY>60),{passive:true});
  </script>
</body>
</html>
