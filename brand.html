<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand — LouShoot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Syne:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:#080808; --dark:#161616; --surface:#1E1E1E; --line:#2A2A2A;
      --grey:#5A5A5A; --white:#F0EBE3; --white-dim:#9A9390; --accent:#C2A882;
      --serif:'Cormorant',Georgia,serif; --sans:'Syne',sans-serif;
      --ease:cubic-bezier(.25,.1,.25,1); --ease-out:cubic-bezier(0,0,.2,1);
    }
    html { background:var(--black); color:var(--white); font-family:var(--sans); cursor:none; }
    body { background:var(--black); overflow-x:hidden; }
    #noise { position:fixed; inset:0; pointer-events:none; z-index:9000; opacity:.032;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:200px; }
    #cursor-dot  { position:fixed; width:5px; height:5px; background:var(--white); border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); transition:background .2s,width .25s,height .25s; }
    #cursor-ring { position:fixed; width:32px; height:32px; border:1px solid rgba(240,235,227,.35); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); transition:width .3s var(--ease),height .3s var(--ease),border-color .3s; }
    body.ch #cursor-dot  { width:7px; height:7px; background:var(--accent); }
    body.ch #cursor-ring { width:52px; height:52px; border-color:rgba(194,168,130,.45); }

    nav { position:fixed; top:0; left:0; right:0; z-index:800; display:flex; align-items:center; justify-content:space-between; padding:28px 48px; transition:padding .6s var(--ease); }
    nav.scrolled { padding:20px 48px; background:rgba(8,8,8,.88); backdrop-filter:blur(14px); border-bottom:1px solid rgba(42,42,42,.5); }
    .nav-logo { font-family:var(--serif); font-weight:300; font-size:16px; letter-spacing:.25em; text-transform:uppercase; color:var(--white); text-decoration:none; cursor:none; }
    .nav-back { font-family:var(--sans); font-size:9px; letter-spacing:.28em; text-transform:uppercase; color:var(--white-dim); text-decoration:none; cursor:none; display:flex; align-items:center; gap:10px; transition:color .4s; }
    .nav-back:hover { color:var(--white); }

    .section-intro { padding:160px 48px 80px; }
    .section-eyebrow { font-family:var(--sans); font-size:9px; letter-spacing:.35em; text-transform:uppercase; color:var(--grey); margin-bottom:20px; display:block; }
    .section-h1 { font-family:var(--serif); font-size:clamp(48px,7vw,90px); font-weight:300; letter-spacing:.05em; line-height:.92; color:var(--white); }
    .section-desc { margin-top:28px; font-family:var(--serif); font-size:clamp(14px,1.3vw,17px); font-weight:300; font-style:italic; line-height:1.75; color:var(--white-dim); max-width:480px; }

    .proj-grid { padding:0 3px 3px; display:grid; grid-template-columns:repeat(2,1fr); gap:3px; }

    .proj-cover {
      position:relative; aspect-ratio:4/5; overflow:hidden;
      display:block; text-decoration:none; cursor:none;
      background:var(--dark);
    }
    .proj-cover:nth-child(3) { margin-top:-80px; }
    .proj-cover:nth-child(4) { margin-top:80px; }

    .proj-cover.full { grid-column:span 2; aspect-ratio:unset; height:500px; margin-top:0 !important; }

    .proj-cover img, .proj-cover .ph {
      width:100%; height:100%; object-fit:cover; display:block;
      background:var(--surface);
      transition:transform 1.2s var(--ease);
    }
    .proj-cover:hover img,
    .proj-cover:hover .ph { transform:scale(1.04); }

    .proj-meta {
      position:absolute; bottom:0; left:0; right:0;
      padding:32px 32px 28px;
      background:linear-gradient(to top,rgba(8,8,8,.88) 0%,transparent 100%);
    }
    .proj-name { font-family:var(--serif); font-size:clamp(20px,2.2vw,28px); font-weight:300; letter-spacing:.06em; color:var(--white); transform:translateY(4px); transition:transform .55s var(--ease); }
    .proj-cover:hover .proj-name { transform:translateY(0); }
    .proj-tag  { font-family:var(--sans); font-size:9px; letter-spacing:.28em; text-transform:uppercase; color:var(--accent); margin-top:6px; opacity:0; transform:translateY(6px); transition:opacity .55s var(--ease) .05s,transform .55s var(--ease) .05s; }
    .proj-cover:hover .proj-tag { opacity:1; transform:translateY(0); }

    .reveal { opacity:0; transform:translateY(24px); transition:opacity .9s var(--ease-out),transform .9s var(--ease-out); }
    .reveal.v { opacity:1; transform:translateY(0); }
    .rd1{transition-delay:.1s} .rd2{transition-delay:.2s} .rd3{transition-delay:.3s} .rd4{transition-delay:.4s} .rd5{transition-delay:.5s}

    footer { padding:28px 48px; display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--line); margin-top:3px; }
    .ft-logo { font-family:var(--serif); font-weight:300; font-size:13px; letter-spacing:.2em; text-transform:uppercase; color:var(--grey); }
    .ft-copy { font-family:var(--sans); font-size:9px; letter-spacing:.18em; color:var(--grey); }

    @media(max-width:768px){
      nav,nav.scrolled{padding:20px 24px}
      .section-intro{padding:120px 24px 60px}
      .proj-grid{grid-template-columns:1fr; padding:0 3px 3px}
      .proj-cover:nth-child(3),.proj-cover:nth-child(4){margin-top:0}
      .proj-cover.full{height:340px}
      footer{padding:24px 20px;flex-direction:column;gap:12px}
    }
  </style>
</head>
<body>
  <div id="noise"></div>
  <div id="cursor-dot"></div>
  <div id="cursor-ring"></div>

  <nav id="navbar">
    <a href="index.html" class="nav-logo">LouShoot</a>
    <a href="index.html" class="nav-back">
      <svg width="20" height="8" viewBox="0 0 20 8" fill="none"><line x1="20" y1="4" x2="3" y2="4" stroke="currentColor" stroke-width=".8"/><polyline points="6,1 1,4 6,7" fill="none" stroke="currentColor" stroke-width=".8"/></svg>
      Home
    </a>
  </nav>

  <div class="section-intro">
    <span class="section-eyebrow reveal">01 — Brand</span>
    <h1 class="section-h1 reveal rd1">Brand</h1>
    <p class="section-desc reveal rd2">Visual campaigns, lookbooks and editorial work for brands — where identity meets image.</p>
  </div>

  <div class="proj-grid">
    <a href="brand/yyb.html" class="proj-cover reveal rd1">
      <img src="assets/sections/brand/yyb/couv.jpg" alt="YYB" />
      <div class="proj-meta">
        <div class="proj-name">YYB</div>
        <div class="proj-tag">Campaign &nbsp;·&nbsp; Brand</div>
      </div>
    </a>

    <a href="brand/fetcha.html" class="proj-cover reveal rd2">
      <img src="assets/sections/brand/fetcha/couv.jpg" alt="Fetcha" />
      <div class="proj-meta">
        <div class="proj-name">Fetcha</div>
        <div class="proj-tag">Brand &nbsp;·&nbsp; Lookbook</div>
      </div>
    </a>

    <a href="brand/dedictd.html" class="proj-cover reveal rd3">
      <img src="assets/sections/brand/dedictd/couv.jpg" alt="Dedictd" />
      <div class="proj-meta">
        <div class="proj-name">Dedictd</div>
        <div class="proj-tag">Campaign &nbsp;·&nbsp; Brand</div>
      </div>
    </a>

    <a href="brand/cinq-visages.html" class="proj-cover reveal rd4">
      <img src="assets/sections/brand/cinq-visages/Couverture.jpg" alt="Cinq Visages" />
      <div class="proj-meta">
        <div class="proj-name">Cinq Visages</div>
        <div class="proj-tag">Editorial &nbsp;·&nbsp; Brand</div>
      </div>
    </a>

    <a href="brand/jamais-nue.html" class="proj-cover full reveal rd5">
      <img src="assets/sections/brand/jamais-nue/couv.jpg" alt="Jamais Nue" />
      <div class="proj-meta">
        <div class="proj-name">Jamais Nue</div>
        <div class="proj-tag">Campaign &nbsp;·&nbsp; Brand</div>
      </div>
    </a>
  </div>

  <footer>
    <span class="ft-logo">LouShoot</span>
    <span class="ft-copy">© 2025 — All rights reserved</span>
  </footer>

  <script>
    const dot=document.getElementById('cursor-dot'),ring=document.getElementById('cursor-ring');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
    (function r(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(r);})();
    document.querySelectorAll('a').forEach(el=>{el.addEventListener('mouseenter',()=>document.body.classList.add('ch'));el.addEventListener('mouseleave',()=>document.body.classList.remove('ch'));});
    window.addEventListener('scroll',()=>document.getElementById('navbar').classList.toggle('scrolled',scrollY>60),{passive:true});
    const obs=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('v');obs.unobserve(x.target);}}),{threshold:.1});
    document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
  </script>
</body>
</html>
