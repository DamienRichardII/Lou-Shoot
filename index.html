<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LouShoot — Photography & Art Direction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Syne:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:    #080808;
      --dark:     #161616;
      --line:     #2A2A2A;
      --grey:     #5A5A5A;
      --white:    #F0EBE3;
      --white-dim:#9A9390;
      --accent:   #C2A882;
      --serif:    'Cormorant', Georgia, serif;
      --sans:     'Syne', sans-serif;
      --ease:     cubic-bezier(0.25, 0.1, 0.25, 1);
      --ease-out: cubic-bezier(0.0, 0.0, 0.2, 1);
    }

    html { background: var(--black); color: var(--white); font-family: var(--sans); cursor: none; }
    body { background: var(--black); overflow-x: hidden; }
    ::selection { background: rgba(194,168,130,0.15); }

    #cursor-dot  { position:fixed; width:5px; height:5px; background:var(--white); border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); transition:background .2s, width .25s, height .25s; }
    #cursor-ring { position:fixed; width:32px; height:32px; border:1px solid rgba(240,235,227,.35); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); transition:width .3s var(--ease), height .3s var(--ease), border-color .3s; }
    body.ch #cursor-dot  { width:7px; height:7px; background:var(--accent); }
    body.ch #cursor-ring { width:52px; height:52px; border-color:rgba(194,168,130,.45); }

    #noise { position:fixed; inset:0; pointer-events:none; z-index:9000; opacity:.032;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:200px; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 800;
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 48px;
      transition: padding .6s var(--ease);
    }
    nav.scrolled {
      padding: 20px 48px;
      background: rgba(8,8,8,.85);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(42,42,42,.5);
    }
    .nav-logo { font-family:var(--serif); font-weight:300; font-size:16px; letter-spacing:.25em; text-transform:uppercase; color:var(--white); text-decoration:none; cursor:none; }
    .nav-index { font-family:var(--sans); font-size:9px; letter-spacing:.32em; text-transform:uppercase; color:var(--white-dim); }

    #hero {
      position: relative;
      width: 100%; height: 100svh; min-height: 600px;
      overflow: hidden;
      display: flex; align-items: flex-end;
      border-bottom: 1px solid var(--line);
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .hero-vignette {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(to top, rgba(8,8,8,.9) 0%, rgba(8,8,8,.2) 40%, transparent 70%),
                  linear-gradient(to right, rgba(8,8,8,.4) 0%, transparent 55%);
    }
    .hero-content { position:relative; z-index:2; padding:0 48px 64px; }
    .hero-name { font-family:var(--serif); font-size:clamp(56px,9vw,120px); font-weight:300; letter-spacing:.04em; line-height:.92; color:var(--white); display:block; white-space:nowrap; }
    .hero-sub  { margin-top:22px; font-family:var(--sans); font-size:10px; letter-spacing:.38em; text-transform:uppercase; color:var(--white-dim); }
    .hero-scroll { position:absolute; bottom:40px; right:48px; z-index:2; display:flex; flex-direction:column; align-items:center; gap:12px; }
    .hero-scroll span { font-family:var(--sans); font-size:8px; letter-spacing:.3em; text-transform:uppercase; color:var(--grey); writing-mode:vertical-rl; }
    .scroll-line { width:1px; height:48px; background:linear-gradient(to bottom,var(--grey),transparent); animation:pulse 2.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.3;transform:scaleY(.6) translateY(-4px)} 50%{opacity:1;transform:scaleY(1) translateY(4px)} }

    .portal-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 3px;
      align-items: stretch;
      padding-top: 3px;
    }

    .portal {
      position: relative;
      width: 100%;
      height: 82svh;
      min-height: 560px;
      overflow: hidden;
      display: block;
      text-decoration: none;
      cursor: none;
      background: var(--dark);
    }

    .portal-media {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      transition: transform 1.6s var(--ease);
      background: var(--dark);
    }

    .portal:hover .portal-media { transform: scale(1.02); }

    .portal-overlay {
      position: absolute; inset: 0; z-index: 1;
      background:
        linear-gradient(to top, rgba(8,8,8,.88) 0%, rgba(8,8,8,.15) 45%, transparent 65%),
        linear-gradient(to right, rgba(8,8,8,.5) 0%, transparent 50%);
      transition: background .8s var(--ease);
    }
    .portal:hover .portal-overlay {
      background:
        linear-gradient(to top, rgba(8,8,8,.82) 0%, rgba(8,8,8,.18) 40%, rgba(8,8,8,.08) 65%),
        linear-gradient(to right, rgba(8,8,8,.45) 0%, transparent 50%);
    }

    .portal-content {
      position: absolute; z-index: 2;
      bottom: 0; left: 0; right: 0;
      padding: 0 48px 56px;
      display: flex; align-items: flex-end; justify-content: space-between;
    }
    .portal-num   { font-family:var(--sans); font-size:9px; letter-spacing:.35em; text-transform:uppercase; color:var(--grey); margin-bottom:14px; display:block; }
    .portal-title { font-family:var(--serif); font-size:clamp(44px,7.5vw,100px); font-weight:300; letter-spacing:.04em; line-height:.9; color:var(--white); }

    .portal-enter {
      font-family: var(--sans);
      font-size: 9px;
      letter-spacing: .32em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      transform: translateX(-8px);
      transition: opacity .6s var(--ease), transform .6s var(--ease);
      align-self: flex-end;
      padding-bottom: 12px;
    }
    .portal:hover .portal-enter { opacity: 1; transform: translateX(0); }

    .portal-index {
      position: absolute; top: 48px; right: 48px; z-index: 2;
      font-family: var(--sans); font-size: 9px; letter-spacing: .3em;
      text-transform: uppercase; color: rgba(240,235,227,.25);
    }

    .reveal { opacity:0; transform:translateY(24px); transition:opacity .9s var(--ease-out), transform .9s var(--ease-out); }
    .reveal.v { opacity:1; transform:translateY(0); }
    .rd1{transition-delay:.1s} .rd2{transition-delay:.22s}

    footer { padding:28px 48px; display:flex; align-items:center; justify-content:space-between; border-top:1px solid var(--line); }
    .ft-logo { font-family:var(--serif); font-weight:300; font-size:13px; letter-spacing:.2em; text-transform:uppercase; color:var(--grey); }
    .ft-copy { font-family:var(--sans); font-size:9px; letter-spacing:.18em; color:var(--grey); }

    @media (max-width: 1100px) {
      .portal-row { grid-template-columns: 1fr; }
      .portal { height: 72svh; min-height: 500px; }
    }

    @media (max-width:768px) {
      nav { padding:20px 24px; }
      nav.scrolled { padding:16px 24px; }
      .hero-content { padding:0 24px 48px; }
      .hero-scroll { right:24px; }
      .portal-content { padding:0 24px 40px; }
      .portal-index { top:28px; right:24px; }
      .portal { height: 68svh; min-height: 440px; }
      footer { padding:24px 20px; flex-direction:column; gap:12px; }
    }
  </style>
</head>
<body>
  <div id="noise"></div>
  <div id="cursor-dot"></div>
  <div id="cursor-ring"></div>

  <nav id="navbar">
    <span class="nav-logo">LouShoot</span>
    <span class="nav-index">Portfolio</span>
  </nav>

  <section id="hero">
    <video class="hero-bg" autoplay muted loop playsinline preload="auto">
      <source src="assets/hero/PJ1.MOV" />
    </video>
    <div class="hero-vignette"></div>
    <div class="hero-content">
            <p class="hero-sub reveal rd2">Photography &nbsp;·&nbsp; Art Direction</p>
    </div>
    <div class="hero-scroll">
      <div class="scroll-line"></div>
      <span>Scroll</span>
    </div>
  </section>

  <section class="portal-row">
    <a href="brand.html" class="portal" id="portal-brand">
      <video class="portal-media" autoplay muted loop playsinline preload="auto">
        <source src="assets/sections/brand/section-entry/Couv.MOV" />
      </video>
      <div class="portal-overlay"></div>
      <span class="portal-index">01 / 04</span>
      <div class="portal-content">
        <div>
          <h2 class="portal-title">Brands</h2>
        </div>
        <span class="portal-enter">Enter &nbsp;→</span>
      </div>
    </a>

    <a href="editorial.html" class="portal" id="portal-editorial">
      <video class="portal-media" autoplay muted loop playsinline preload="auto">
        <source src="assets/sections/editorial/section-entry/Couverture.MP4" type="video/mp4" />
      </video>
      <div class="portal-overlay"></div>
      <span class="portal-index">02 / 04</span>
      <div class="portal-content">
        <div>
          <h2 class="portal-title">Editorial</h2>
        </div>
        <span class="portal-enter">Enter &nbsp;→</span>
      </div>
    </a>

    <a href="personnal-project.html" class="portal" id="portal-personal">
      <video class="portal-media" autoplay muted loop playsinline preload="auto">
        <source src="assets/sections/Personnal project/COUV.MOV" />
      </video>
      <div class="portal-overlay"></div>
      <span class="portal-index">03 / 04</span>
      <div class="portal-content">
        <div>
          <h2 class="portal-title">Personal Project</h2>
        </div>
        <span class="portal-enter">Enter &nbsp;→</span>
      </div>
    </a>

    <a href="contact.html" class="portal" id="portal-contact">
      <img class="portal-media" src="assets/sections/contact/section-entry/COUV.jpg" alt="Contact" />
      <div class="portal-overlay"></div>
      <span class="portal-index">04 / 04</span>
      <div class="portal-content">
        <div>
          <h2 class="portal-title">Contact</h2>
        </div>
        <span class="portal-enter">Enter &nbsp;→</span>
      </div>
    </a>
  </section>

  <footer>
    <span class="ft-logo">LouShoot</span>
    <span class="ft-copy">© 2025 — All rights reserved</span>
  </footer>

  <script>
    const dot=document.getElementById('cursor-dot'), ring=document.getElementById('cursor-ring');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
    (function r(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(r);})();
    document.querySelectorAll('a,.portal').forEach(el=>{
      el.addEventListener('mouseenter',()=>document.body.classList.add('ch'));
      el.addEventListener('mouseleave',()=>document.body.classList.remove('ch'));
    });
    window.addEventListener('scroll',()=>document.getElementById('navbar').classList.toggle('scrolled',scrollY>60),{passive:true});
    const obs=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('v');obs.unobserve(x.target);}}),{threshold:.1});
    document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
    window.addEventListener('load',()=>document.querySelectorAll('#hero .reveal').forEach(el=>el.classList.add('v')));
  </script>
</body>
</html>
