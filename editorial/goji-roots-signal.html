<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Goji Roots Signal — LouShoot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Syne:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--black:#000000;--dark:#070707;--surface:#101010;--line:#1A1A1A;--grey:#7A7A7A;--white:#F4F4F4;--white-dim:#A6A6A6;--accent:#C2A882;--serif:'Cormorant',Georgia,serif;--sans:'Syne',sans-serif;--ease:cubic-bezier(.25,.1,.25,1);--ease-out:cubic-bezier(0,0,.2,1)}
    html{background:var(--black);color:var(--white);font-family:var(--sans);cursor:none}body{background:var(--black);overflow-x:hidden}
    #noise{position:fixed;inset:0;pointer-events:none;z-index:9000;opacity:.032;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}
    #cursor-dot{position:fixed;width:5px;height:5px;background:var(--white);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
    #cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(240,235,227,.35);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s var(--ease),height .3s,border-color .3s}
    body.ch #cursor-dot{width:7px;height:7px;background:var(--accent)}body.ch #cursor-ring{width:52px;height:52px;border-color:rgba(194,168,130,.45)}
    nav{position:fixed;top:0;left:0;right:0;z-index:800;display:flex;align-items:center;justify-content:space-between;padding:28px 48px;transition:padding .6s var(--ease)}
    nav.scrolled{padding:20px 48px;background:rgba(8,8,8,.88);backdrop-filter:blur(14px);border-bottom:1px solid rgba(42,42,42,.5)}
    .nav-logo{font-family:var(--serif);font-weight:300;font-size:16px;letter-spacing:.25em;text-transform:uppercase;color:var(--white);text-decoration:none;cursor:none}
    .nav-back{font-family:var(--sans);font-size:9px;letter-spacing:.28em;text-transform:uppercase;color:var(--white-dim);text-decoration:none;cursor:none;display:flex;align-items:center;gap:10px;transition:color .4s}
    .nav-back:hover{color:var(--white)}
    .ed-hero{width:100%;min-height:100svh;display:grid;grid-template-columns:1fr 1fr;position:relative}
    .ed-hero-img{position:relative;overflow:hidden;min-height:100svh}
    .ed-hero-img img,.ed-hero-img .ph{width:100%;height:100%;object-fit:cover;display:block;background:var(--dark)}
    .ed-hero-text{display:flex;flex-direction:column;justify-content:flex-end;padding:120px 48px 64px 48px;background:var(--black)}
    .ed-issue{font-family:var(--sans);font-size:9px;letter-spacing:.35em;text-transform:uppercase;color:var(--accent);margin-bottom:20px}
    .ed-title{font-family:var(--serif);font-size:clamp(32px,4.5vw,58px);font-weight:300;letter-spacing:.04em;line-height:1;color:var(--white);margin-bottom:28px}
    .ed-desc{font-family:var(--serif);font-size:clamp(14px,1.3vw,17px);font-weight:300;font-style:italic;line-height:1.8;color:var(--white-dim);max-width:380px}
    .ed-banner{width:100%;aspect-ratio:21/9;overflow:hidden;margin:3px 0;background:var(--dark)}
    .ed-banner img,.ed-banner .ph{width:100%;height:100%;object-fit:cover;display:block;background:var(--surface)}
    .ed-gallery{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:0 0 3px}
    .ed-gallery .gi{aspect-ratio:4/5;overflow:hidden;background:var(--dark)}
    .ed-gallery .gi img,.ed-gallery .gi .ph{width:100%;height:100%;object-fit:cover;display:block;background:var(--surface)}
    .ed-gallery .gi:nth-child(2){margin-top:60px}
    .ed-gallery .gi.full{grid-column:span 2;aspect-ratio:16/7;margin-top:0 !important}
    .proj-footer{padding:40px 48px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
    .pf-logo{font-family:var(--serif);font-weight:300;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:var(--grey)}
    .pf-back{font-family:var(--sans);font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--grey);text-decoration:none;cursor:none;transition:color .4s}
    .pf-back:hover{color:var(--white)}
    @media(max-width:768px){nav,nav.scrolled{padding:20px 24px}.ed-hero{grid-template-columns:1fr}.ed-hero-img{min-height:60svh}.ed-hero-text{padding:48px 24px}.ed-gallery{grid-template-columns:1fr}.ed-gallery .gi:nth-child(2){margin-top:0}.ed-gallery .gi.full{grid-column:auto;aspect-ratio:4/5}.proj-footer{padding:28px 20px;flex-direction:column;gap:12px}}
  </style>
</head>
<body>
  <div id="noise"></div><div id="cursor-dot"></div><div id="cursor-ring"></div>
  <nav id="navbar">
    <a href="../index.html" class="nav-logo">LouShoot</a>
    <a href="../editorial.html" class="nav-back"><svg width="20" height="8" viewBox="0 0 20 8" fill="none"><line x1="20" y1="4" x2="3" y2="4" stroke="currentColor" stroke-width=".8"/><polyline points="6,1 1,4 6,7" fill="none" stroke="currentColor" stroke-width=".8"/></svg>Editorial</a>
  </nav>
  <div class="ed-hero">
    <div class="ed-hero-img">
      <img src="../assets/sections/editorial/goji-roots-signal/BANNIERE.jpg" alt="Goji Roots Signal"/>
    </div>
    <div class="ed-hero-text">
      <p class="ed-issue">Editorial Series</p>
      <h1 class="ed-title">Goji Roots Signal</h1>
      <p class="ed-desc">Rhythm, vibration and visual resonance. A series built like a pulse between image, styling and printed matter.</p>
    </div>
  </div>
  <div class="ed-banner">
    <img src="../assets/sections/editorial/goji-roots-signal/BANNIERE.jpg" alt="Goji Roots Signal banner"/>
  </div>
  <div class="ed-gallery">
    <div class="gi"><img src="../assets/sections/editorial/goji-roots-signal/1L8A5105-2.jpg" alt="Goji Roots Signal image 1" /></div>
    <div class="gi"><img src="../assets/sections/editorial/goji-roots-signal/goji-magazine-138-2026-40.jpg" alt="Goji Roots Signal image 2" /></div>
    <div class="gi"><img src="../assets/sections/editorial/goji-roots-signal/goji-magazine-138-2026-41.jpg" alt="Goji Roots Signal image 3" /></div>
    <div class="gi"><img src="../assets/sections/editorial/goji-roots-signal/goji-magazine-138-2026-44.jpg" alt="Goji Roots Signal image 4" /></div>
  </div>
  <footer class="proj-footer">
    <span class="pf-logo">LouShoot</span>
    <a href="../editorial.html" class="pf-back">← Back to Editorial</a>
  </footer>
  <script>
    const dot=document.getElementById('cursor-dot'),ring=document.getElementById('cursor-ring');let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
    (function r(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(r);})();
    document.querySelectorAll('a').forEach(el=>{el.addEventListener('mouseenter',()=>document.body.classList.add('ch'));el.addEventListener('mouseleave',()=>document.body.classList.remove('ch'));});
    window.addEventListener('scroll',()=>document.getElementById('navbar').classList.toggle('scrolled',scrollY>60),{passive:true});
  </script>
</body>
</html>
